$font = JetBrainsMono Nerd Font

$base = rgba(23, 21, 36, 1)
$surface = rgba(42, 39, 63, 1)
$overlay = rgba(57, 53, 82, 1)
$muted = rgba(144, 140, 170, 1)
$subtle = rgba(144, 140, 170, 1)
$text = rgba(224, 222, 244, 1)
$love = rgba(235, 111, 146, 1)
$gold = rgba(246, 193, 119, 1)
$rose = rgba(234, 154, 151, 1)
$pine = rgba(62, 143, 176, 1)
$foam = rgba(156, 207, 216, 1)
$iris = rgba(196, 167, 231, 1)

general {
    hide_cursor = false
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
}

input-field {
    monitor =
    size = 20%, 5%
    outline_thickness = 3

    color = $base
    inner_color = $surface
    outer_color = $pine
    font_color = $text
    placeholder_color = $muted
    check_color = $iris
    fail_color = $love

    fade_on_empty = false
    rounding = 15

    font_family = $font
    placeholder_text = Input password...
    fail_text = $PAMFAIL

    dots_spacing = 0.3

    position = 0, -20
    halign = center
    valign = center
}

# TIME
label {
    monitor =
    text = $TIME
    font_size = 90
    font_family = $font
    color = $text

    position = -30, 0
    halign = right
    valign = top
}

# DATE
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y"
    font_size = 25
    font_family = $font
    color = $muted

    position = -30, -150
    halign = right
    valign = top
}
